<!DOCTYPE html>
<html>
<head>
    <title>Enhanced Basic Calculator</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 150px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            cursor: pointer;
        }

        #result {
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Basic Calculator</h2>

    <input type="number" id="num1" placeholder="Enter First Number">
    <input type="number" id="num2" placeholder="Enter Second Number">
    <br>

    <button onclick="calculate('add')">Add</button>
    <button onclick="calculate('sub')">Subtract</button>
    <button onclick="calculate('mul')">Multiply</button>
    <button onclick="calculate('div')">Divide</button>

    <div id="result"></div>

    <script>
        function calculate(operation) {

            let number1 = document.getElementById("num1").value;
            let number2 = document.getElementById("num2").value;
            let resultDiv = document.getElementById("result");

            // Check if inputs are empty
            if (number1 === "" || number2 === "") {
                resultDiv.innerHTML = "Error: Please enter both numbers!";
                resultDiv.style.color = "red";
                return;
            }

            let num1 = parseFloat(number1);
            let num2 = parseFloat(number2);
            let result;

            if (operation === "add") {
                result = num1 + num2;
            }
            else if (operation === "sub") {
                result = num1 - num2;
            }
            else if (operation === "mul") {
                result = num1 * num2;
            }
            else if (operation === "div") {

                if (num2 === 0) {
                    resultDiv.innerHTML = "Error: Cannot divide by zero!";
                    resultDiv.style.color = "red";
                    return;
                }

                result = num1 / num2;
            }

            // Display result
            resultDiv.innerHTML = "Result: " + result;
            resultDiv.style.color = "green";
        }
    </script>

</body>
</html>
