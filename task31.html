<!DOCTYPE html>
<html>
<head>
    <title>Student Array of Objects</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            margin-top: 40px;
        }

        .container {
            width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #007BFF;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .topper {
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Student Records</h2>
    <button onclick="showData()">Display Students</button>

    <div id="studentTable"></div>
    <div id="results" class="result"></div>
</div>

<script>
    function showData() {

        // 1️⃣ Create array of 3 student objects
        let students = [
            { name: "Ayesha", marks: 85 },
            { name: "Ali", marks: 92 },
            { name: "Sara", marks: 78 }
        ];

        let tableHTML = `
            <table>
                <tr>
                    <th>Name</th>
                    <th>Marks</th>
                </tr>
        `;

        let totalMarks = 0;
        let topper = students[0];

        // 2️⃣ Loop over array of objects
        for (let i = 0; i < students.length; i++) {

            tableHTML += `
                <tr>
                    <td>${students[i].name}</td>
                    <td>${students[i].marks}</td>
                </tr>
            `;

            totalMarks += students[i].marks;

            // 4️⃣ Find topper
            if (students[i].marks > topper.marks) {
                topper = students[i];
            }
        }

        tableHTML += "</table>";

        document.getElementById("studentTable").innerHTML = tableHTML;

        // 3️⃣ Calculate average
        let average = totalMarks / students.length;

        document.getElementById("results").innerHTML =
            "Average Marks: " + average.toFixed(2) +
            "<br>Topper: <span class='topper'>" +
            topper.name + " (" + topper.marks + " marks)</span>";
    }
</script>

</body>
</html>
